osc=no
volume=30
[Idle]
profile-cond=p["idle-active"]
profile-restore=copy-equal
title=' '
keepaspect=no
background=1
[extension.webm]
loop-file=inf
[extension.mp4]
loop-file=inf
[extension.m4v]
loop-file=inf
[extension.mkv]
loop-file=inf
hwdec=auto
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-directory="~/Pictures/screenshots"
screenshot-template="%F-%p-%n"